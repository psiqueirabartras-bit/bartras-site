<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bartras — Acesso Interno</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e1012;
      --bg2: #13171a;
      --bg3: #181d21;
      --border: rgba(93,202,165,0.12);
      --teal: #5dcaa5;
      --teal-dim: rgba(93,202,165,0.08);
      --text: #dce8e2;
      --text-muted: #7a9a8e;
      --text-dim: #3d5a50;
      --white: #f0f8f4;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(93,202,165,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(93,202,165,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(93,202,165,0.07) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin: 1rem;
    }

    .login-logo {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--teal);
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
      display: block;
    }
    .login-logo span { color: var(--text-dim); }

    .login-title {
      font-family: var(--sans);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }

    .login-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      letter-spacing: 0.04em;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    input {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.82rem;
      padding: 11px 14px;
      border-radius: 3px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { border-color: var(--teal); }
    input::placeholder { color: var(--text-dim); }

    .btn-login {
      width: 100%;
      background: var(--teal);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 13px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-error {
      font-size: 0.72rem;
      color: #f07070;
      margin-top: 0.8rem;
      display: none;
      text-align: center;
    }

    .login-footer {
      margin-top: 2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .login-footer a {
      font-size: 0.68rem;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    .login-footer a:hover { color: var(--teal); }

    .login-badge {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="login-card">
    <a href="index.html" class="login-logo">bartras<span>.consulting</span></a>
    <div class="login-title">Acesso Interno</div>
    <div class="login-sub">// sistema de gestão · acesso restrito</div>

    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="btnLogin" onclick="fazerLogin()">Entrar →</button>
    <div class="login-error" id="loginError"></div>

    <div class="login-footer">
      <a href="index.html">← Voltar ao site</a>
      <span class="login-badge">BARTRAS SYS v1.0</span>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://yznipdfibrbjskhxkcfy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6bmlwZGZpYnJianNraHhrY2Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NDE2MjAsImV4cCI6MjA5NTMxNzYyMH0.yL-qVvJU4NZOECOPwKRv8dgz1JhN-ZInC5uMockUoz0';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Se já está logado, vai direto pro sistema
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'sistema.html';

    window.fazerLogin = async function() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btnLogin');
      const erro = document.getElementById('loginError');

      if (!email || !senha) {
        erro.textContent = '✗ Preencha e-mail e senha.';
        erro.style.display = 'block';
        return;
      }

      btn.textContent = 'Entrando...';
      btn.disabled = true;
      erro.style.display = 'none';

      const { error } = await supabase.auth.signInWithPassword({ email, password: senha });

      if (error) {
        erro.textContent = '✗ E-mail ou senha incorretos.';
        erro.style.display = 'block';
        btn.textContent = 'Entrar →';
        btn.disabled = false;
      } else {
        window.location.href = 'sistema.html';
      }
    };

    // Enter key
    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.fazerLogin();
    });
  </script>
</body>
</html>
